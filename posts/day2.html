<h1>Day 2 - If Else in Python</h1>

<h2>What I learned:</h2>
<ul>
  <li>if statement</li>
  <li>if-else</li>
  <li>elif conditions</li>
</ul>

<h2>Example:</h2>
<pre>
age = 18

if age >= 18:
    print("Adult")
else:
    print("Minor")
</pre>

<h2>My Practice:</h2>
<pre>
age = int(input("Enter age: "))

if age >= 18:
    print("Eligible to vote")
else:
    print("Not eligible")
</pre>
